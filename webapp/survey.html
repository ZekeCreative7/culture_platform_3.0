<!doctype html>

  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #030712; /* ى¹ ي‌‘ ê°™ى‌€ ë”¥ ë‹¤يپ¬ ë°°ê²½ */
        --card-bg: rgba(13, 20, 45, 0.45); /* ë‹¤يپ¬ ê¸€ë‍کىٹ¤ */
        --primary: #3b82f6;
        --primary-hover: #0072ff;

      * {

      body {

        display: flex;

        min-height: 100vh;

        overflow-x: hidden;

      }

      /* ëھ½ي™کى پى‌¸ ë„¤ىک¨ ë°±ê·¸ë‌¼ىڑ´ë“œ ë¸”ëں¬ */
      body::before {
        content: "";
        position: fixed;
        top: -15%;
        right: -15%;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(0, 114, 255, 0.25) 0%, transparent 70%);

        z-index: -1;
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        bottom: -10%;
        left: -15%;
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, rgba(157, 78, 221, 0.2) 0%, transparent 70%);
        filter: blur(90px);
        z-index: -1;
        pointer-events: none;
      }

      .container {
        width: 100%;
        max-width: 500px;
        background: var(--card-bg);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 24px 68px -8px rgba(0, 0, 0, 0.6);
        padding: 36px 24px;
        margin-top: 10px;
      }

      header {
        border-bottom: 1px solid var(--border);
        padding-bottom: 24px;
        margin-bottom: 28px;
        text-align: center;
      }

      header h1 {
        font-size: 20px;

        color: #ffffff;
        margin: 0 0 8px 0;

        background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);

      }

      header p {

      }

      .section-info {

        font-weight: 600;
      }

      .question-card {
        margin-bottom: 32px;
      }

      .question-card label.q-title {
        display: block;
        font-size: 14.5px;

      }

      .input-text, select {

      }

      .input-text:focus, select:focus {

        background-color: rgba(255, 255, 255, 0.06);

      }

      select option {

      }

      textarea.input-text {

      }

      .scale-container {
        display: flex;

        gap: 10px;
      }

      .scale-option {
        display: flex;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        background: rgba(255, 255, 255, 0.02);
      }

      .scale-option:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.15);
      }

      .scale-option input[type="radio"] {
        margin-right: 14px;
        width: 20px;
        height: 20px;
        accent-color: var(--neon-blue);
        cursor: pointer;
      }

      .scale-option span {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
      }

      .scale-option.active {
        background: rgba(0, 114, 255, 0.1);
        border-color: var(--neon-blue);
        box-shadow: 0 0 12px rgba(0, 114, 255, 0.2);
      }

      .scale-option.active span {
        color: #ffffff;
        font-weight: 700;
      }

      .submit-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--neon-blue) 0%, #0056cc 100%);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 24px;
        box-shadow: 0 4px 14px rgba(0, 114, 255, 0.25);
      }

      .submit-btn:hover {
        transform: translateY(-1.5px);
        box-shadow: 0 6px 18px rgba(0, 114, 255, 0.4);
      }

      .success-view {
        text-align: center;
        padding: 40px 10px;
      }

      .success-icon {
        width: 72px;
        height: 72px;
        background: rgba(16, 185, 129, 0.12);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #10b981;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin: 0 auto 24px auto;
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.25);
      }

      .success-view h2 {
        font-size: 22px;
        font-weight: 800;
        color: #ffffff;
        margin: 0 0 12px 0;
        font-family: 'Outfit', sans-serif;
      }

      .success-view p {
        font-size: 15px;
        color: var(--text-muted);
        line-height: 1.6;
        margin: 0;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container" id="survey-content">
      <div id="loading" style="text-align:center; color:var(--text-muted); padding:20px;">ى„¤ë¬¸ ى–‘ى‹‌ى‌„ ë¶ˆëں¬ىک¤ëٹ” ى¤‘ى‍…ë‹ˆë‹¤...</div>
    </div>

    <script>
      const STORE_KEY = "culture-platform-webapp-v1";
      const SCORE_VALUES = {
        "ë§¤ىڑ° ê·¸ë ‡ë‹¤": 5,
        "ê·¸ë ‡ë‹¤": 4,
        "ë³´ي†µ": 3,
        "ê·¸ë ‡ى§€ ى•ٹë‹¤": 2,
        "ى „يک€ ê·¸ë ‡ى§€ ى•ٹë‹¤": 1,
        "ëھ¨ë¦„/ي•´ë‹¹ى—†ى‌Œ": null
      };

      const urlParams = new URLSearchParams(window.location.search);
      const encodedData = urlParams.get('d');
      const surveyId = urlParams.get('surveyId');

      window.addEventListener('DOMContentLoaded', () => {
        // Primary: read survey data encoded in URL (works on any device)
        if (encodedData) {
          try {
            // Restore standard base64 from URL-safe base64 (- â†’ +, _ â†’ /, re-pad)
            const b64 = encodedData.replace(/-/g, '+').replace(/_/g, '/');
            const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
            const payload = JSON.parse(decodeURIComponent(escape(atob(padded))));
            const session = { id: payload.sessionId, type: payload.sessionType || '', cohort: payload.sessionCohort || '' };
            renderSurveyForm(payload, session);
            return;
          } catch (e) {
            console.error('URL ëچ°ى‌´ي„° يŒŒى‹± ى‹¤يŒ¨, localStorageë،œ ëŒ€ى²´ ى‹œëڈ„', e);
          }
        }

        // Fallback: read from localStorage (same device only)
        if (!surveyId) {
          showError("ى„¤ë¬¸ IDê°€ ëˆ„ë‌½ëگکى—ˆىٹµë‹ˆë‹¤. ى •ىƒپى پى‌¸ ë§پيپ¬ë¥¼ ى‌´ىڑ©ي•´ ى£¼ى„¸ىڑ”.");
          return;
        }
        const storeData = JSON.parse(localStorage.getItem(STORE_KEY)) || { sessions: [], responses: [], surveys: [] };
        const survey = (storeData.surveys || []).find(s => s.id === surveyId);
        const session = (storeData.sessions || []).find(s => s.id === (survey ? survey.sessionId : ""));

        if (!survey || !session) {
          showError("ي•´ë‹¹ ى„¤ë¬¸ى،°ى‚¬ë¥¼ ى°¾ى‌„ ىˆک ى—†ê±°ë‚ک ë§Œë£Œëگکى—ˆىٹµë‹ˆë‹¤.<br/>ى„¤ë¬¸ى§€ë¥¼ ë‹¤ى‹œ ë°°يڈ¬ي•کê±°ë‚ک ىڑ´ىکپى‍گى—گê²Œ ë¬¸ى‌کي•´ ى£¼ى„¸ىڑ”.");
          return;
        }

        renderSurveyForm(survey, session);
      });

      function showError(msg) {
        document.getElementById('survey-content').innerHTML = `
          <div style="text-align: center; padding: 30px 0;">
            <div style="font-size: 48px; margin-bottom: 20px;">âڑ ï¸ڈ</div>
            <h2 style="font-size: 18px; margin-bottom: 12px; color: #ef4444; font-family: 'Outfit', sans-serif;">ىک¤ë¥ک ë°œىƒ‌</h2>
            <p style="color: var(--text-muted); font-size: 14px; line-height: 1.6;">${msg}</p>
          </div>
        `;
      }

      function renderSurveyForm(survey, session) {
        const container = document.getElementById('survey-content');
        
        let html = `
          <header>
            <h1>${escapeHtml(survey.title)}</h1>
            <p>${escapeHtml(session.type)} آ· ${escapeHtml(session.cohort)}ê¸° ëŒ€ىƒپى‌„ ىœ„ي•œ ى‌µëھ… ى„¤ë¬¸ى،°ى‚¬ى‍…ë‹ˆë‹¤.</p>
          </header>
          
          <div class="section-info">
            ë³¸ ى„¤ë¬¸ى،°ى‚¬ëٹ” ى™„ى „ي‍ˆ ى‌µëھ…ىœ¼ë،œ ى§„ي–‰ëگکë©°, ë‹µë³€ ë‚´ىڑ©ى‌€ ي†µê³„ى پىœ¼ë،œ ي•©ى‚°ي•کى—¬ ë¶„ى„‌ى—گë§Œ ي™œىڑ©ëگ©ë‹ˆë‹¤. ê°œى‌¸ ى‹‌ë³„ ى •ë³´ëٹ” ى‌¼ى ˆ ىˆکى§‘ي•کى§€ ى•ٹىٹµë‹ˆë‹¤.
          </div>

          <form id="survey-form">
            <div class="question-card">
              <label class="q-title" for="cohort-select">ë³¸ى‌¸ى‌ک ى°¸ى—¬ ê¸°ىˆکë¥¼ ى„ يƒ‌ي•´ ى£¼ى„¸ىڑ”. *</label>
              <select id="cohort-select" required>
                <option value="${session.cohort}">${session.cohort}ê¸°</option>
              </select>
            </div>
        `;

        survey.questions.forEach((q, idx) => {
          const qId = q.id;
          const isQuant = q.type === 'quant';

          html += `<div class="question-card">`;
          html += `<label class="q-title">${idx + 1}. ${escapeHtml(q.text)} *</label>`;

          if (isQuant) {
            html += `<div class="scale-container">`;
            Object.keys(SCORE_VALUES).forEach((label) => {
              html += `
                <label class="scale-option" onclick="selectRadio(this)">
                  <input type="radio" name="${qId}" value="${label}" required />
                  <span>${label}</span>
                </label>
              `;
            });
            html += `</div>`;
          } else {
            html += `
              <textarea class="input-text" name="${qId}" placeholder="ë‹µë³€ى‌„ ى‍…ë ¥ي•´ ى£¼ى„¸ىڑ”." required></textarea>
            `;
          }
          html += `</div>`;
        });

        html += `
            <button type="submit" class="submit-btn">ى„¤ë¬¸ ى œى¶œي•کê¸°</button>
          </form>
        `;

        container.innerHTML = html;

        const form = document.getElementById('survey-form');
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          submitSurvey(survey, session);
        });
      }

      function selectRadio(element) {
        const siblings = element.parentNode.querySelectorAll('.scale-option');
        siblings.forEach(s => s.classList.remove('active'));
        element.classList.add('active');
        element.querySelector('input').checked = true;
      }

      function submitSurvey(survey, session) {
        const storeData = JSON.parse(localStorage.getItem(STORE_KEY)) || { sessions: [], responses: [], surveys: [] };
        const form = document.getElementById('survey-form');
        const formData = new FormData(form);
        const cohort = parseInt(document.getElementById('cohort-select').value);

        const response = {
          id: Math.floor(Date.now() + Math.random() * 100000).toString(36),
          sessionId: survey.sessionId,
          phase: survey.phase,
          cohort: cohort,
          createdAt: new Date().toISOString()
        };

        survey.questions.forEach(q => {
          const val = formData.get(q.id);
          if (q.type === 'quant') {
            response[q.id] = val ? SCORE_VALUES[val] : null;
          } else {
            response[q.id] = val || "";
          }
        });

        storeData.responses.push(response);
        localStorage.setItem(STORE_KEY, JSON.stringify(storeData));

        document.getElementById('survey-content').innerHTML = `
          <div class="success-view">
            <div class="success-icon">âœ“</div>
            <h2>ى œى¶œ ى™„ë£Œ</h2>
            <p>ى„¤ë¬¸ى،°ى‚¬ى—گ ى‌‘ي•´ى£¼ى…”ى„œ ëŒ€ë‹¨ي‍ˆ ê°گى‚¬ي•©ë‹ˆë‹¤.<br />ى‍…ë ¥ي•کى‹  ë‹µë³€ى‌´ ى„±ê³µى پىœ¼ë،œ ê¸°ë،‌ëگکى—ˆىٹµë‹ˆë‹¤.</p>
          </div>
        `;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    </script>
  </body>
